<!doctype html>
<html lang="pt-BR" class="bg-base use-bg-image">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08030f" />
  <meta name="description" content="Login da galeria neon oficial da Nexarium Ômega." />
  <title>Entrar — NEXARIUM ÔMEGA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="96x96" href="logotipo/logo.png" />
  <link rel="apple-touch-icon" href="logotipo/logo.png" />
  <link rel="shortcut icon" href="logotipo/logo.png" />
</head>
<body class="auth-page">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="background-decoration" aria-hidden="true">
    <span class="gradient-orb orb-1"></span>
    <span class="gradient-orb orb-2"></span>
    <span class="gradient-orb orb-3"></span>
    <span class="gradient-orb orb-4"></span>
    <span class="gradient-orb orb-5"></span>
    <span class="gradient-orb orb-6"></span>
  </div>

  <main class="auth-wrapper" role="main">
    <section class="auth-card" aria-labelledby="authTitle">
      <div class="auth-brand">
        <img src="logotipo/logo.png" alt="Logotipo Nexarium Ômega" class="auth-logo" />
        <div>
          <p class="auth-eyebrow">NEXARIUM ÔMEGA</p>
          <h1 id="authTitle">Olá, entre para acessar sua galeria</h1>
          <p class="auth-description">Use uma conta para acessar e gerenciar suas imagens e vídeos com estilo neon.</p>
        </div>
      </div>

      <div class="auth-toggle" role="tablist" aria-label="Alternar entre login e cadastro">
        <button id="loginModeBtn" type="button" class="auth-toggle-btn active" role="tab" aria-selected="true">Login</button>
        <button id="registerModeBtn" type="button" class="auth-toggle-btn" role="tab" aria-selected="false">Cadastro</button>
      </div>

      <form id="authForm" class="auth-form">
        <label class="auth-field">
          <span>Email</span>
          <input id="authEmail" type="email" inputmode="email" autocomplete="email" required placeholder="seu@email.com" />
        </label>
        <label class="auth-field">
          <span>Senha</span>
          <input id="authPassword" type="password" autocomplete="current-password" required placeholder="••••••••" minlength="6" />
        </label>

        <button id="authSubmitBtn" class="auth-submit" type="submit">Entrar</button>
      </form>

      <p id="authMessage" class="auth-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
